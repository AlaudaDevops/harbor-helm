---
apiVersion: v1
kind: Service
metadata:
  name: minio-svc
spec:
  internalTrafficPolicy: Cluster
  ports:
    - appProtocol: tcp
      name: tcp-9000
      port: 9000
      protocol: TCP
      targetPort: 9000
    - appProtocol: tcp
      name: tcp-9001
      port: 9001
      protocol: TCP
      targetPort: 9001
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: minio
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: minio
    spec:
      affinity: {}
      containers:
        - args:
            - server
            - /tmp/data-minio
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: admin
            - name: MINIO_ROOT_PASSWORD
              value: 07Apples@
          image: <config.{{.registry.cluster | default "152-231-registry.alauda.cn:60070"}}>/3rdparty/bitnami/minio:latest
          imagePullPolicy: IfNotPresent
          name: minio
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: "100Mi"
