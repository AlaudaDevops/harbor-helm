---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-mc
          image: <config.{{.registry.cluster | default "152-231-registry.alauda.cn:60070"}}>/3rdparty/bitnami/minio:latest
          command:
            - /bin/sh
            - -c
            - |
              export MC_CONFIG_DIR=/tmp/.mc
              
              echo "Setting up MinIO client configuration..."
              until mc alias set local http://minio-svc:9000 admin 07Apples@; do
                echo "Waiting for MinIO to be ready..."
                sleep 5
              done
              
              # Verify MinIO connection
              echo "Verifying MinIO connection..."
              if ! mc admin info local; then
                echo "Failed to connect to MinIO server"
                exit 1
              fi
              
              # Function to create a bucket
              create_bucket() {
                local bucket_name="$1"
                echo "Creating bucket: $bucket_name"
                if mc mb local/$bucket_name; then
                  echo "Successfully created bucket: $bucket_name"
                else
                  echo "Bucket $bucket_name already exists or failed to create"
                fi
              }
              
              # Create default buckets for Harbor (matching values configuration)
              for bucket in harbor-bucket; do
                create_bucket "$bucket"
              done
              
              echo "Default buckets creation completed"
              echo "Listing all buckets:"
              mc ls local

