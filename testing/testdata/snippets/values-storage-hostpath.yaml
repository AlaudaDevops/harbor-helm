global:
  permission:
    initContainer:
      enabled: true
persistence:
  enabled: true
  hostPath:
    registry:
      path: /tmp/harbor/registry
    jobservice:
      path: /tmp/harbor/jobservice
    trivy:
      path: /tmp/harbor/trivy

registry:
  nodeSelector:
    kubernetes.io/hostname: <node.name.random>

jobservice:
  nodeSelector:
    kubernetes.io/hostname: <node.name.random>

trivy:
  nodeSelector:
    kubernetes.io/hostname: <node.name.random>
