apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: harbor-all-in-one
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^(/allinone)$"
    pipelinesascode.tekton.dev/on-cel-expression: |-
      (
        source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
        !last_commit_title.contains("Auto-commit")
      ) && ((
        event == "push" && (
          source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.startsWith("refs/tags/")
        )
      ) || (
        event == "pull_request" && (
          target_branch.matches("^(main|master|release-.*|alauda-.*)$")
        )
      ))
    pipelinesascode.tekton.dev/max-keep-runs: "30"
spec:
  timeouts:
    pipeline: 3h
    tasks: 1h

  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ source_branch }}"
    - name: git-commit
      value: "{{ revision }}"
    - name: build-path
      value: subtree/harbor
    - name: image-tag
      value: 2.12.4-"{{ revision }}"

  pipelineSpec:
    description: The pipeline is used to combine multiple pipeline templates
    params:
      - name: git-url
        description: Repository URL to clone from.
        type: string
      - name: git-revision
        description: Revision to checkout. (branch, tag, sha, ref, etc...)
        type: string
      - name: git-commit
        description: Commit sha used in this build
        default: ""
      - name: build-path
        description: The path to the build directory, it is the related path to the source code.
        type: string
        default: "."
      - name: reuse-artifact
        description: >-
          If set to true, the task will reuse the built image from the previous run.
          This is useful for speeding up the build process when the image has not changed.
        default: "true"

      - name: image-tag
        description: The tag to be added to the built image.
        type: string

      - name: build-path
        description: Path to the directory to build the image from
        type: string
        default: "./subtree/harbor"

      - name: pre-build-command
        description: The command to be used to pre-build the image.
        type: string
        default: |
          export IMAGENAMESPACE="build-harbor.alauda.cn/devops"
          export BASEIMAGENAMESPACE="build-harbor.alauda.cn/devops"
          export PUSHBASEIMAGE=false
          export DOCKERBUILD="docker buildx build --platform=linux/$ARCH --builder builder --push --metadata-file --provenance=false .build-metadata.txt"

      - name: build-command
        description: The command to be used to build the image.
        type: string

      - name: post-build-command
        description: The command to be used to post-build the image.
        type: string
        default: |
          echo "==== build metadata"
          cat .build-metadata.txt
          echo "==== build metadata"
      - name: fetch-third-party-script
        type: string
        default: |
          TRIVY_VERSION=0.62.2-alauda-0
          TRIVY_DOWNLOAD_URL=https://github.com/AlaudaDevops/trivy/releases/download/v${TRIVY_VERSION}/trivy_Linux_${ARCH}.tar.gz
          cd ${BUILDPATH}/make/photon/trivy-adapter
          curl -L ${TRIVY_DOWNLOAD_URL} | tar -xz
          mv alauda-trivy trivy
          cd -

          TRIVY_ADAPTER_VERSION=0.33.2-alauda-0
          TRIVY_ADAPTER_DOWNLOAD_URL=https://github.com/AlaudaDevops/harbor-scanner-trivy/releases/download/v${TRIVY_ADAPTER_VERSION}/harbor-scanner-trivy_${TRIVY_ADAPTER_VERSION}_Linux_${ARCH}.tar.gz
          cd ${BUILDPATH}/make/photon/trivy-adapter
          curl -L ${TRIVY_ADAPTER_DOWNLOAD_URL} | tar -xz
          mv alauda-scanner-trivy scanner-trivy
          cd -

          # compile registry
          REGISTRY_SRC=https://github.com/distribution/distribution.git
          REGISTRY_SRC_TAG=v2.8.3
          cd ${BUILDPATH}/make/photon/registry && ./builder ${REGISTRY_SRC_TAG} ${REGISTRY_SRC} && cd -
    tasks:
      - name: git-clone-amd64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-amd64
          - name: basic-auth
            workspace: basic-auth

      - name: git-clone-arm64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-arm64
          - name: basic-auth
            workspace: basic-auth

      - name: patch-amd64
        runAfter:
          - git-clone-amd64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
        workspaces:
          - name: source
            workspace: source-amd64

      - name: patch-arm64
        runAfter:
          - git-clone-arm64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
              bash make/patches/patch-arm64.sh
        workspaces:
          - name: source
            workspace: source-arm64

      - name: compile-amd64
        runAfter:
          - patch-amd64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-amd64

      - name: compile-arm64
        runAfter:
          - patch-arm64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-arm64

      - name: fetch-thirdparty-amd64
        runAfter:
          - patch-amd64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=x86_64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-amd64

      - name: fetch-thirdparty-arm64
        runAfter:
          - patch-arm64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
