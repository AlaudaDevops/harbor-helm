      - name: build-e2e-image
        runAfter:
          - generate-tag
        timeout: 60m
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: extras
            - name: kind
              value: task
            - name: name
              value: buildx
            - name: version
              value: "0.1"
        workspaces:
          - name: source
            workspace: source-amd64
          - name: dockerconfig
            workspace: dockerconfig
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: trivy-args
            value: $(params.trivy-args)
          - name: prepare-command
            value: |
              cd $(params.build-path)/tests/test-engine-image && ./generate.sh api && cd -
          - name: image-url
            value: build-harbor.alauda.cn/devops/harbor-e2e-engine
          - name: image-tags
            value:
              - $(tasks.generate-tag.results.string-result)
          - name: dockerfile
            value: $(params.build-path)/tests/test-engine-image/Dockerfile
          - name: labels
            value:
              - branch=$(build.git.branch.name)
              - commit=$(build.git.lastCommit.id)
              - commit_id=$(build.git.lastCommit.id)
          - name: context
            value: $(params.build-path)/tests/test-engine-image

      - name: update-image-tags
        runAfter:
          - build-core-image
          - build-jobservice-image
          - build-registryctl-image
          - build-redis-image
          - build-db-image
          - build-portal-image
          - build-nginx-image
          - build-registry-image
          - build-trivy-adapter-image
          - build-exporter-image
          - build-e2e-image
        timeout: 20m
        retries: 0
        params:
          - name: image
            value: registry.alauda.cn:60080/devops/nonroot/alauda-docker-buildx:latest
          - name: imagePullPolicy
            value: Always
          - name: script
            value: |
              set -e
              
              image_tag=$(tasks.generate-tag.results.string-result)
              
              # update image tag in values.yaml
              echo "update image tag in values.yaml"
              make update-component-image-tag TAG=${image_tag} KEY=core 
              make update-component-image-tag TAG=${image_tag} KEY=jobservice 
              make update-component-image-tag TAG=${image_tag} KEY=registryController 
              make update-component-image-tag TAG=${image_tag} KEY=portal 
              make update-component-image-tag TAG=${image_tag} KEY=exporter 
              make update-component-image-tag TAG=${image_tag} KEY=registry 
              make update-component-image-tag TAG=${image_tag} KEY=nginx 
              make update-component-image-tag TAG=${image_tag} KEY=trivy
              cat values.yaml
              
              # update image tag in base-values.yaml for integration test
              base_values_file=testing/testdata/snippets/base-values.yaml
              echo "update image tag in ${base_values_file}"
              make update-yaml-value FILE=${base_values_file} VALUE=${image_tag} KEY=database.internal.image.tag 
              make update-yaml-value FILE=${base_values_file} VALUE=${image_tag} KEY=redis.internal.image.tag
              cat ${base_values_file}
              
              # update e2e image
              e2e_script=testdata/script/run-harbor-e2e.sh
              echo "update e2e image in ${e2e_script}"
              cd testing
              make update-e2e-image-tag TAG=${image_tag} E2E_SCRIPT=${e2e_script}
              cat ${e2e_script}
              cd -
              
              # write image info into results
              echo "registry.alauda.cn:60070/devops/harbor-e2e-engine:${image_tag}" > $(results.string-result.path)
              echo -n "[
                \"build-harbor.alauda.cn/devops/goharbor-harbor-core:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-harbor-jobservice:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-harbor-registryctl:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-harbor-portal:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-harbor-exporter:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-registry-photon:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-nginx-photon:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-trivy-adapter-photon:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-harbor-db:${image_tag}\",
                \"build-harbor.alauda.cn/devops/goharbor-redis-photon:${image_tag}\"
              ]" > $(results.array-result.path)
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        workspaces:
          - name: source
            workspace: source-amd64

      - name: commit
        runAfter:
          - update-image-tags
        timeout: 60m
        retries: 0
        params:
          - name: BASE_IMAGE
            value: registry.alauda.cn:60080/devops/nonroot/chainguard/git:latest
          - name: GIT_USER_NAME
            value: "Alauda Bot"
          - name: GIT_USER_EMAIL
            value: "alaudabot@alauda.io"
          - name: USER_HOME
            value: "/home/git"
          - name: VERBOSE
            value: "false"
          - name: GIT_SCRIPT
            value: |
              set -e
              
              # Create temporary script file
              TMP_SCRIPT=$(mktemp)
  
              # Write script content to temp file
              # Harbor use patches file to update source code, but we only want to update the specified files
              # So we use git stash to stash the changes and restore other changes
              cat <<EOF > "${TMP_SCRIPT}"
              git stash push --keep-index -- \
                testing/testdata/script/run-harbor-e2e.sh \
                testing/testdata/snippets/base-values.yaml \
                values.yaml
              git restore .
              git stash pop
              EOF
              chmod +x "${TMP_SCRIPT}"

              COMMIT_MESSAGE="Auto-commit by alaudabot in edge [ci skip] - $(context.taskRun.namespace)/$(context.taskRun.name)"

              # Commit the changes
              git-push-commit.sh \
                --revision $(params.git-revision) \
                --source-path $(workspaces.source.path) \
                --output-path $(results.commit.path) \
                --message "${COMMIT_MESSAGE}" \
                --pre-commit "${TMP_SCRIPT}"

        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: extras
            - name: kind
              value: task
            - name: name
              value: git-cli
            - name: version
              value: "0.4"
        workspaces:
          - name: source
            workspace: source-amd64
          - name: basic-auth
            workspace: basic-auth

      - name: trigger-e2e-test
        timeout: 30m
        retries: 0
        runAfter:
          - commit
        taskRef:
          params:
            - name: catalog
              value: alauda
            - name: kind
              value: task
            - name: name
              value: trigger-pac
            - name: version
              value: "0.1"
          resolver: hub
        workspaces:
          - name: secret
            workspace: incoming-secret
        params:
          - name: repository
            value: alaudadevops-harbor-helm
          - name: branch
            value: $(params.git-revision)
          - name: pipeline-run
            value: harbor-integration-test

  taskRunTemplate:
    # 让所有任务都以非 root 用户运行。
    podTemplate:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
  taskRunSpecs:
    - pipelineTaskName: compile-amd64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: compile-arm64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: fetch-thirdparty-amd64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: fetch-thirdparty-arm64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi

  workspaces:
    - name: source-amd64
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 1Gi
    - name: source-arm64
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 1Gi
    - name: dockerconfig
      secret:
        secretName: build-harbor.kauto.docfj
    # This secret will be replaced by the pac controller
    - name: basic-auth
      secret:
        secretName: "{{ git_auth_secret }}"
    - name: gitversion-config
      configMap:
        name: gitversion-config
    - name: sonar-credentials
      secret:
        secretName: sonarqube-credentials
    - name: go-cache
      persistentVolumeClaim:
        claimName: build-cache-v4
    - name: signkey
      secret:
        secretName: signing-secrets
    - name: incoming-secret
      secret:
        secretName: harbor-helm-repo-incoming-secret
