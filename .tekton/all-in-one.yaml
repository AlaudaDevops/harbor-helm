apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: harbor-all-in-one
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^(/allinone)$"
    pipelinesascode.tekton.dev/on-cel-expression: |-
      (
        source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
        !last_commit_title.contains("Auto-commit")
      ) && ((
        event == "push" && (
          source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.startsWith("refs/tags/")
        )
      ) || (
        event == "pull_request" && (
          target_branch.matches("^(main|master|release-.*|alauda-.*)$")
        )
      ))
    pipelinesascode.tekton.dev/max-keep-runs: "30"
spec:
  timeouts:
    pipeline: 3h
    tasks: 1h

  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ source_branch }}"
    - name: git-commit
      value: "{{ revision }}"
    - name: build-path
      value: subtree/harbor
    - name: tag-template
      value: 2.12.4-g$ShortSha

  pipelineSpec:
    description: The pipeline is used to combine multiple pipeline templates
    params:
      - name: git-url
        description: Repository URL to clone from.
        type: string
      - name: git-revision
        description: Revision to checkout. (branch, tag, sha, ref, etc...)
        type: string
      - name: git-commit
        description: Commit sha used in this build
        default: ""
      - name: tag-template
        description: >-
          The template to generate the image tag.
          The following variables can be used in the template:
          - $FULL_SEM_VERSION: The complete version string, e.g: 2.13.0-feat86.3.ga84887a
          - $ShortSha: The short commit ID, e.g a84887a
          - $Major: The major version, e.g: 2
          - $Minor: The minor version, e.g: 13
          - $Patch: The patch version, e.g: 0
          - $MajorMinorPatch: The major and minor version, e.g: 2.13.0
          - $PreReleaseNumber: The pre-release version, e.g: 86.3
          - $CustomVariable: Custom variables generated by tag-variables-generator script
      - name: file-list-for-commit-sha
        type: array
        default:
          - "."
        description: >
          This list of files will be used to calculate the most recently modified commit sha.
          It is used to set the `SOURCE_DATE_EPOCH` environment variable and version number,
          ensuring that the image digest remains consistent when files have not changed.
      - name: reuse-artifact
        description: >-
          If set to true, the task will reuse the built image from the previous run.
          This is useful for speeding up the build process when the image has not changed.
        default: "true"

      - name: build-path
        description: Path to the directory to build the image from
        type: string
        default: "./subtree/harbor"

      - name: pre-build-command
        description: The command to be used to pre-build the image.
        type: string
        default: |
          export IMAGENAMESPACE="build-harbor.alauda.cn/devops"
          export BASEIMAGENAMESPACE="build-harbor.alauda.cn/devops"
          export PUSHBASEIMAGE=false
          export DOCKERBUILD="docker buildx build --platform=linux/$ARCH --builder builder --push --metadata-file --output=oci-mediatypes=false --provenance=false --metadata-file .build-metadata.txt"

      - name: post-build-command
        description: The command to be used to post-build the image.
        type: string
        default: |
          echo "==== build metadata"
          cat .build-metadata.txt
          echo "==== build metadata"
      - name: fetch-third-party-script
        type: string
        default: |
          # download trivy and scanner-trivy
          
          # renovate: datasource=github-releases depName=trivy packageName=AlaudaDevops/trivy
          TRIVY_VERSION=0.62.2-alauda-6
          
          # renovate: datasource=github-releases depName=harbor-scanner-trivy packageName=AlaudaDevops/harbor-scanner-trivy
          TRIVY_ADAPTER_VERSION=0.33.2-alauda-4
          
          TRIVY_DOWNLOAD_URL=https://github.com/AlaudaDevops/trivy/releases/download/v${TRIVY_VERSION}/trivy_Linux_${ARCH}.tar.gz
          TRIVY_ADAPTER_DOWNLOAD_URL=https://github.com/AlaudaDevops/harbor-scanner-trivy/releases/download/v${TRIVY_ADAPTER_VERSION}/harbor-scanner-trivy_${TRIVY_ADAPTER_VERSION}_Linux_${ARCH}.tar.gz
          
          cd ${BUILDPATH}/make/photon/trivy-adapter
          mkdir -p binary
          curl -L ${TRIVY_DOWNLOAD_URL} | tar -xz
          curl -L ${TRIVY_ADAPTER_DOWNLOAD_URL} | tar -xz
          mv alauda-trivy binary/trivy
          mv alauda-scanner-trivy binary/scanner-trivy
          cd -
          
          # compile registry
          REGISTRY_SRC=https://github.com/distribution/distribution.git
          REGISTRY_SRC_TAG=v2.8.3
          cd ${BUILDPATH}/make/photon/registry && ./builder ${REGISTRY_SRC_TAG} ${REGISTRY_SRC} && cd -
      - name: trivy-args
        type: string
        default: >-
          --scanners vuln
          --skip-db-update=false
          --db-repository=registry.alauda.cn:60070/ops/aquasecurity/trivy-db
          --skip-java-db-update=false
          --java-db-repository=registry.alauda.cn:60070/ops/aquasecurity/trivy-java-db
          --exit-code=1
    results:
      - name: e2e-image
        description: The e2e image built by this pipeline
        type: string
        value: $(tasks.update-image-tags.results.string-result)
      - name: components-images
        description: The components images built by this pipeline
        type: array
        value: $(tasks.update-image-tags.results.array-result)
    tasks:
      - name: git-clone-amd64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-amd64
          - name: basic-auth
            workspace: basic-auth

      - name: git-clone-arm64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-arm64
          - name: basic-auth
            workspace: basic-auth

      - name: calculate-commit-sha
        runAfter:
          - git-clone-amd64
        timeout: 10m
        retries: 1
        params:
          - name: image
            value: registry.alauda.cn:60080/devops/nonroot/chainguard/git:latest
          - name: args
            value: $(params.file-list-for-commit-sha[*])
          - name: imagePullPolicy
            value: Always
          - name: script
            value: |
              #!/bin/bash
              set -ex
              
              # Add the source directory to the safe.directory list
              git config --global --add safe.directory $(workspaces.source.path)
              
              # Initialize environment variables
              export GIT_URL=$(params.git-url)
              export GIT_REVISION=$(params.git-revision)
              export RESET_GIT_COMMIT=$(params.git-commit)
              export RESULT_STRING_PATH=$(results.string-result.path)
              export RESULT_ARRAY_PATH=$(results.array-result.path)
              export RESULT_OBJECT_PATH=$(results.object-result.path)
              export DEFAULT_GIT_COMMIT=$(git rev-parse HEAD)
              export DEFAULT_GIT_COMMITTER_DATE=$(git log -1 --pretty=%ct)
              export WORKSPACE_SOURCE_PATH=$(workspaces.source.path)
              export WORKSPACE_SECRET_BOUND=$(workspaces.secret.bound)
              export WORKSPACE_SECRET_PATH=$(workspaces.secret.path)
              
              # calculate the last commit info
              calculate-last-commit-info.sh $@
              
              # Define the commit info file path and create the directory if it doesn't exist
              COMMIT_INFO_FILE=".git/$(context.pipelineRun.name)/.last-changed-commit-sha"
              mkdir -p "$(dirname ${COMMIT_INFO_FILE})"
              # Store the last changed commit sha in a file
              cp -f $(results.string-result.path) "${COMMIT_INFO_FILE}"
              
              # Store the original git revision in a file
              echo -n "${GIT_REVISION}" > .git/$(context.pipelineRun.name)/.git-revision
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        workspaces:
          - name: source
            workspace: source-amd64
          - name: secret
            workspace: basic-auth

      - name: git-version
        retries: 1
        runAfter:
          - calculate-commit-sha
        params:
          - name: gitversion-image
            value: registry.alauda.cn:60080/devops/gittools/gitversion:6.0.5
          - name: yq-image
            value: registry.alauda.cn:60080/devops/nonroot/yq:latest
          - name: commit
            value: $(tasks.calculate-commit-sha.results.string-result)
          - name: config-file
            value: GitVersion.yaml
          - name: post-command
            value: |
              # Extract version information from gitversion output
              PRE_RELEASE_LABEL=$(sed -n 's/.*"PreReleaseLabel": "\([^"]*\)".*/\1/p' $FINAL_RESULTS_PATH)
              INFORMATIONAL_VERSION=$(sed -n 's/.*"InformationalVersion": "\([^"]*\)".*/\1/p' $FINAL_RESULTS_PATH)
              FULL_SEM_VERSION=$(sed -n 's/.*"FullSemVer": "\([^"]*\)".*/\1/p' $FINAL_RESULTS_PATH)
              
              # Get current branch name
              current_revision=$(git branch --show-current)
              
              GIT_REVISION=$(cat .git/$(context.pipelineRun.name)/.git-revision)
              
              # Only adjust FullSemVer when:
              # 1. PreReleaseLabel cannot be empty to avoid affecting the version of the tag.
              # 2. This revision is not a tag.
              if [ -n "$PRE_RELEASE_LABEL" ] && [ "${GIT_REVISION#refs/tags/}" = "${GIT_REVISION}" ]; then
                sed -i "s/\"FullSemVer\": \"[^\"]*\"/\"FullSemVer\": \"$INFORMATIONAL_VERSION\"/" $FINAL_RESULTS_PATH
                echo "Current revision: $current_revision"
                echo "Adjusted FullSemVer from $FULL_SEM_VERSION to $INFORMATIONAL_VERSION"
              fi
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: extras
            - name: kind
              value: task
            - name: name
              value: git-version
            - name: version
              value: "0.2"
        timeout: 10m0s
        workspaces:
          - name: source
            workspace: source-amd64
          - name: basic-auth
            workspace: basic-auth
          - name: config
            workspace: gitversion-config

      - name: generate-tag
        runAfter:
          - git-version
        timeout: 60m
        retries: 0
        params:
          - name: image
            value: registry.alauda.cn:60080/devops/nonroot/alauda-docker-buildx:latest
          - name: args
            value:
              - $(tasks.git-version.results.variables.FullSemVer)
          - name: script
            value: |
              #!/bin/sh
              set -e
              
              full_sem_ver=$(tasks.git-version.results.variables.FullSemVer)
              
              export FULL_SEM_VERSION="$full_sem_ver"
              export ShortSha=$(tasks.git-version.results.variables.ShortSha)
              export Major=$(tasks.git-version.results.variables.Major)
              export Minor=$(tasks.git-version.results.variables.Minor)
              export Patch=$(tasks.git-version.results.variables.Patch)
              export MajorMinorPatch=$(tasks.git-version.results.variables.MajorMinorPatch)
              export PreReleaseNumber=$(tasks.git-version.results.variables.PreReleaseNumber)
              export FullSemVer=$(tasks.git-version.results.variables.FullSemVer)
              
              tag=$(echo "$(params.tag-template)")
              echo -n "$tag" > $(results.string-result.path)
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        workspaces:
          - name: source
            workspace: source-amd64

      - name: patch-amd64
        runAfter:
          - git-clone-amd64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
        workspaces:
          - name: source
            workspace: source-amd64

      - name: patch-arm64
        runAfter:
          - git-clone-arm64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
              bash make/patches/patch-arm64.sh
        workspaces:
          - name: source
            workspace: source-arm64

      - name: compile-amd64
        runAfter:
          - patch-amd64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-amd64

      - name: compile-arm64
        runAfter:
          - patch-arm64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-arm64

      - name: fetch-thirdparty-amd64
        runAfter:
          - patch-amd64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=x86_64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-amd64

      - name: fetch-thirdparty-arm64
        runAfter:
          - patch-arm64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=arm64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-arm64

      - name: build-core-image
        runAfter:
          - generate-tag
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: kind
              value: pipeline
            - name: type
              value: tekton
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: trivy-args
            value: $(params.trivy-args)
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-core:$(tasks.generate-tag.results.string-result)
          - name: build-command
            value: |
              set -ex
              
              $(params.pre-build-command)
              
              export VERSIONTAG=$(tasks.generate-tag.results.string-result)-$ARCH
              export BASEIMAGETAG=$(tasks.generate-tag.results.string-result)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_core
              
              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-jobservice-image
        runAfter:
          - generate-tag
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: kind
              value: pipeline
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: trivy-args
            value: $(params.trivy-args)
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-jobservice:$(tasks.generate-tag.results.string-result)
          - name: build-command
            value: |
              set -ex
              
              $(params.pre-build-command)
              
              export VERSIONTAG=$(tasks.generate-tag.results.string-result)-$ARCH
              export BASEIMAGETAG=$(tasks.generate-tag.results.string-result)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_jobservice
              
              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-registryctl-image
        runAfter:
          - generate-tag
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: kind
              value: pipeline
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: trivy-args
            value: $(params.trivy-args)
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-registryctl:$(tasks.generate-tag.results.string-result)
          - name: build-command
            value: |
              set -ex

              $(params.pre-build-command)

              export VERSIONTAG=$(tasks.generate-tag.results.string-result)-$ARCH
              export BASEIMAGETAG=$(tasks.generate-tag.results.string-result)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_registryctl

              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-redis-image
        runAfter:
          - generate-tag
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: kind
              value: pipeline
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: skip-trivy-scan
            value: "true"
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-redis-photon:$(tasks.generate-tag.results.string-result)
          - name: build-command
            value: |
              set -ex

              $(params.pre-build-command)

              export VERSIONTAG=$(tasks.generate-tag.results.string-result)-$ARCH
              export BASEIMAGETAG=$(tasks.generate-tag.results.string-result)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_bitnami_redis

              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-db-image
        runAfter:
          - generate-tag
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: kind
              value: pipeline
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: skip-trivy-scan
            value: "true"
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-db:$(tasks.generate-tag.results.string-result)
          - name: build-command
            value: |
              set -ex

              $(params.pre-build-command)

              export VERSIONTAG=$(tasks.generate-tag.results.string-result)-$ARCH
              export BASEIMAGETAG=$(tasks.generate-tag.results.string-result)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_db

              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-portal-image
        runAfter:
          - generate-tag
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: kind
              value: pipeline
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: trivy-args
            value: $(params.trivy-args)
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-portal:$(tasks.generate-tag.results.string-result)
