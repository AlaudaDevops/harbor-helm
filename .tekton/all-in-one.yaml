            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=arm64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-arm64

      - name: build-core-image
        runAfter:
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: dind-build-merge-scan
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: dind-build-merge-scan
            - name: version
              value: "0.1"
        params:
          - name: reuse-artifact
            value: $(params.reuse-artifact)
          - name: image
            value: build-harbor.alauda.cn/devops/goharbor-harbor-core:$(params.image-tag)
          - name: build-command
            value: |
              set -ex
              
              $(params.pre-build-command)
              
              export VERSIONTAG=$(params.image-tag)-$ARCH
              export BASEIMAGETAG=$(params.image-tag)-$ARCH
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_core
              
              $(params.post-build-command)
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-jobservice-image
