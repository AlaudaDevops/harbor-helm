apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: harbor-all-in-one
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^(/allinone)$"
    pipelinesascode.tekton.dev/on-cel-expression: |-
      (
        source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
        !last_commit_title.contains("Auto-commit")
      ) && ((
        event == "push" && (
          source_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.matches("^(main|master|release-.*|alauda-.*)$") ||
          target_branch.startsWith("refs/tags/")
        )
      ) || (
        event == "pull_request" && (
          target_branch.matches("^(main|master|release-.*|alauda-.*)$")
        )
      ))
    pipelinesascode.tekton.dev/max-keep-runs: "10"
    pipelinesascode.tekton.dev/pipeline: '[.tekton/pipelines/build-harbor-image.yaml]'
spec:
  timeouts:
    pipeline: 3h
    tasks: 1h

  params:
    - name: git-url
      value: "{{ repo_url }}"
    - name: git-revision
      value: "{{ source_branch }}"
    - name: git-commit
      value: "{{ revision }}"
    - name: build-path
      value: subtree/harbor

  pipelineSpec:
    description: The pipeline is used to combine multiple pipeline templates
    params:
      - name: git-url
        description: Repository URL to clone from.
        type: string
      - name: git-revision
        description: Revision to checkout. (branch, tag, sha, ref, etc...)
        type: string
      - name: git-commit
        description: Commit sha used in this build
        default: ""
      - name: build-path
        description: The path to the build directory, it is the related path to the source code.
        type: string
        default: "."
      - name: trivy-args
        type: array
        default:
          - image
          - --scanners
          - vuln
          # - --ignore-unfixed
          # - --severity MEDIUM,HIGH,CRITICAL
          - --skip-db-update=false
          - --db-repository=registry.alauda.cn:60070/ops/aquasecurity/trivy-db
          - --skip-java-db-update=false
          - --java-db-repository=registry.alauda.cn:60070/ops/aquasecurity/trivy-java-db
          - --exit-code=1
      - name: fetch-third-party-script
        type: string
        default: |
          TRIVY_VERSION=0.62.2-alauda-0
          TRIVY_DOWNLOAD_URL=https://github.com/AlaudaDevops/trivy/releases/download/v${TRIVY_VERSION}/trivy_Linux_${ARCH}.tar.gz
          cd ${BUILDPATH}/make/photon/trivy-adapter
          curl -L ${TRIVY_DOWNLOAD_URL} | tar -xz
          mv alauda-trivy trivy
          cd -

          TRIVY_ADAPTER_VERSION=0.33.2-alauda-0
          TRIVY_ADAPTER_DOWNLOAD_URL=https://github.com/AlaudaDevops/harbor-scanner-trivy/releases/download/v${TRIVY_ADAPTER_VERSION}/harbor-scanner-trivy_${TRIVY_ADAPTER_VERSION}_Linux_${ARCH}.tar.gz
          cd ${BUILDPATH}/make/photon/trivy-adapter
          curl -L ${TRIVY_ADAPTER_DOWNLOAD_URL} | tar -xz
          mv alauda-scanner-trivy scanner-trivy
          cd -

          # compile registry
          REGISTRY_SRC=https://github.com/distribution/distribution.git
          REGISTRY_SRC_TAG=v2.8.3
          cd ${BUILDPATH}/make/photon/registry && ./builder ${REGISTRY_SRC_TAG} ${REGISTRY_SRC} && cd -
    tasks:
      - name: git-clone-amd64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-amd64
          - name: basic-auth
            workspace: basic-auth

      - name: git-clone-arm64
        timeout: 30m
        retries: 3
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: version
              value: "0.9"

        params:
          - name: url
            value: $(params.git-url)
          - name: revision
            value: $(params.git-revision)

        workspaces:
          - name: output
            workspace: source-arm64
          - name: basic-auth
            workspace: basic-auth

      - name: patch-amd64
        runAfter:
          - git-clone-amd64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
        workspaces:
          - name: source
            workspace: source-arm64

      - name: patch-arm64
        runAfter:
          - git-clone-arm64
        timeout: 10m
        retries: 1
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: catalog
            - name: kind
              value: task
            - name: name
              value: run-script
            - name: version
              value: "0.1"
        params:
          - name: script
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              bash make/patches/patch-amd64.sh
              bash make/patches/patch-arm64.sh
        workspaces:
          - name: source
            workspace: source-arm64

      - name: compile-amd64
        runAfter:
          - patch-amd64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-amd64

      - name: compile-arm64
        runAfter:
          - patch-arm64
        timeout: 1h
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .) make compile
        workspaces:
          - name: source
            workspace: source-arm64

      - name: fetch-thirdparty-amd64
        runAfter:
          - patch-amd64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=x86_64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-amd64

      - name: fetch-thirdparty-arm64
        runAfter:
          - patch-arm64
        timeout: 60m
        retries: 0
        taskRef:
          resolver: hub
          params:
            - name: catalog
              value: alauda
            - name: type
              value: tekton
            - name: name
              value: docker-in-docker
            - name: version
              value: "0.2"
        params:
          - name: tools-image
            value: registry.alauda.cn:60080/devops/alauda-docker-buildx:latest
          - name: command
            value: |
              set -ex
              cd $(workspaces.source.path)/$(params.build-path)
              BUILDPATH=$(realpath .)
              ARCH=arm64
              
              $(params.fetch-third-party-script)

        workspaces:
          - name: source
            workspace: source-arm64

      - name: build-core-image
        runAfter:
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-core
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_core
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-jobservice-image
        runAfter:
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-jobservice
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_jobservice
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-registryctl-image
        runAfter:
          - compile-amd64
          - compile-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-registryctl
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_registryctl
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-redis-image
        runAfter:
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: redis-photon
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_bitnami_redis
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-db-image
        runAfter:
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-db
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_db
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-portal-image
        runAfter:
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-portal
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_portal
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-nginx-image
        runAfter:
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: nginx-photon
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_nginx
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-registry-image
        runAfter:
          - fetch-thirdparty-amd64
          - fetch-thirdparty-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: registry-photon
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_registry
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-trivy-adapter-image
        runAfter:
          - fetch-thirdparty-amd64
          - fetch-thirdparty-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: trivy-adapter-photon
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_build_trivy_adapter
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

      - name: build-exporter-image
        runAfter:
          - patch-amd64
          - patch-arm64
        timeout: 120m
        retries: 3
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Pipeline
          name: build-harbor-image
          resolver: git
          params:
            - name: url
              value: "{{ repo_url }}"
            - name: revision
              value: "{{ revision }}"
            - name: pathInRepo
              value: .tekton/pipelines/build-harbor-image.yaml
        params:
          - name: component-name
            value: harbor-exporter
          - name: image-tag
            value: 2.12.4-123456
          - name: build-command
            value: |
              cd $(workspaces.source.path)/$(params.build-path)
              make build -e BUILDTARGET=_compile_and_build_exporter
        workspaces:
          - name: source-amd64
            workspace: source-amd64
          - name: source-arm64
            workspace: source-arm64
          - name: dockerconfig
            workspace: dockerconfig

  taskRunTemplate:
    # 让所有任务都以非 root 用户运行。
    podTemplate:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
  taskRunSpecs:
    - pipelineTaskName: compile-amd64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: compile-arm64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: fetch-thirdparty-amd64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    - pipelineTaskName: fetch-thirdparty-arm64
      computeResources:
        limits:
          cpu: "4"
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi

  workspaces:
    - name: source-amd64
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 1Gi
    - name: source-arm64
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 1Gi
    - name: dockerconfig
      secret:
        secretName: build-harbor.kauto.docfj
    # This secret will be replaced by the pac controller
    - name: basic-auth
      secret:
        secretName: "{{ git_auth_secret }}"
    - name: gitversion-config
      configMap:
        name: gitversion-config
    - name: sonar-credentials
      secret:
        secretName: sonarqube-credentials
    - name: go-cache
      persistentVolumeClaim:
        claimName: build-cache-v4
    - name: signkey
      secret:
        secretName: signing-secrets
